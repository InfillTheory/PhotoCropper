<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop — Photo Cropping Tool</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14140f;
    --panel: #1c1c16;
    --panel-raised: #232319;
    --border: #33322a;
    --text: #ede9e0;
    --muted: #8a8578;
    --amber: #d98f22;
    --amber-bright: #f2ac3d;
    --amber-dim: rgba(217,143,34,0.15);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .sprocket-strip{
    height:14px;
    display:flex;
    align-items:center;
    gap:18px;
    padding:0 20px;
    background:#0e0e0a;
    overflow:hidden;
  }
  .sprocket-strip span{
    width:8px; height:8px;
    background:var(--bg);
    border-radius:2px;
    flex-shrink:0;
  }
  header{
    padding:32px 20px 20px;
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  header h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:2.4rem;
    letter-spacing:0.02em;
    margin:0 0 6px;
    color:var(--text);
  }
  header h1 span{ color:var(--amber-bright); }
  header p{
    margin:0;
    color:var(--muted);
    font-size:0.95rem;
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  /* Dropzone */
  #dropzone{
    border:1.5px dashed var(--border);
    border-radius:6px;
    background:var(--panel);
    padding:60px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  #dropzone.dragover{
    border-color:var(--amber);
    background:var(--amber-dim);
  }
  #dropzone .icon{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    letter-spacing:0.15em;
    color:var(--amber);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  #dropzone p{ margin:4px 0; color:var(--text); font-size:1rem; }
  #dropzone .hint{ color:var(--muted); font-size:0.85rem; }
  #fileInput{ display:none; }

  /* Workspace */
  #workspace{ display:none; }
  #workspace.active{ display:block; }

  .frame-tabs{
    display:flex;
    gap:0;
    border:1px solid var(--border);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .frame-tab{
    flex:1 1 auto;
    min-width:84px;
    background:var(--panel);
    color:var(--muted);
    border:none;
    border-right:1px solid var(--border);
    padding:12px 8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.8rem;
    letter-spacing:0.03em;
    cursor:pointer;
    transition:background .12s ease, color .12s ease;
  }
  .frame-tab:last-child{ border-right:none; }
  .frame-tab:hover{ background:var(--panel-raised); color:var(--text); }
  .frame-tab.active{
    background:var(--amber-dim);
    color:var(--amber-bright);
    box-shadow: inset 0 -2px 0 var(--amber);
  }

  .stage{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:16px;
    margin-bottom:18px;
  }
  #imageCanvasWrap{
    max-height:60vh;
    display:flex;
    justify-content:center;
    background:#0e0e0a;
    border-radius:4px;
    overflow:hidden;
  }
  #imageCanvasWrap img{
    display:block;
    max-width:100%;
  }

  .controls-row{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .control-group{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:0.85rem;
    color:var(--muted);
  }
  select, .btn{
    font-family:'Inter',sans-serif;
    font-size:0.88rem;
  }
  select{
    background:var(--panel-raised);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:4px;
    padding:8px 10px;
  }
  input[type="range"]{
    accent-color:var(--amber);
  }
  .readout{
    font-family:'IBM Plex Mono',monospace;
    color:var(--amber-bright);
    min-width:34px;
    display:inline-block;
    text-align:right;
  }

  .btn{
    border:1px solid var(--border);
    background:var(--panel-raised);
    color:var(--text);
    padding:10px 16px;
    border-radius:5px;
    cursor:pointer;
    transition:border-color .12s ease, background .12s ease;
  }
  .btn:hover{ border-color:var(--amber); }
  .btn-primary{
    background:var(--amber);
    border-color:var(--amber);
    color:#14140f;
    font-weight:600;
  }
  .btn-primary:hover{
    background:var(--amber-bright);
    border-color:var(--amber-bright);
  }
  .btn-ghost{
    background:transparent;
  }

  .action-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:flex-end;
  }

  .dims{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.8rem;
    color:var(--muted);
  }
  .dims span{ color:var(--amber-bright); }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:0.78rem;
    padding:20px;
  }

  @media (max-width:520px){
    header h1{ font-size:1.9rem; }
    .frame-tab{ min-width:70px; font-size:0.72rem; padding:10px 4px; }
  }
</style>
</head>
<body>

<div class="sprocket-strip">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<header>
  <h1>CROP<span>.</span></h1>
  <p>Upload a photo, pick a frame, export at full quality — all in your browser.</p>
</header>

<main>

  <div id="dropzone">
    <div class="icon">▢ Load Image</div>
    <p>Click to browse, or drag a photo here</p>
    <p class="hint">JPG, PNG, or WEBP · nothing is uploaded anywhere</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="workspace">

    <div class="frame-tabs" id="frameTabs">
      <button class="frame-tab" data-ratio="1">1:1 Square</button>
      <button class="frame-tab" data-ratio="1.3333333333">4:3 Landscape</button>
      <button class="frame-tab" data-ratio="0.75">3:4 Portrait</button>
      <button class="frame-tab" data-ratio="1.7777777778">16:9 Landscape</button>
      <button class="frame-tab" data-ratio="0.5625">9:16 Portrait</button>
      <button class="frame-tab" data-ratio="NaN">Freeform</button>
    </div>

    <div class="stage">
      <div id="imageCanvasWrap">
        <img id="sourceImage" alt="Uploaded photo">
      </div>
    </div>

    <div class="controls-row">
      <div class="control-group">
        <label for="formatSelect">Export as</label>
        <select id="formatSelect">
          <option value="image/png">PNG (lossless)</option>
          <option value="image/jpeg" selected>JPEG (high quality)</option>
        </select>
      </div>
      <div class="control-group" id="qualityGroup">
        <label for="qualityRange">Quality</label>
        <input type="range" id="qualityRange" min="0.7" max="1" step="0.01" value="0.95">
        <span class="readout" id="qualityReadout">95%</span>
      </div>
      <div class="dims" id="dimsReadout">— × —</div>
    </div>

    <div class="action-row">
      <button class="btn btn-ghost" id="resetBtn">Reset crop</button>
      <button class="btn btn-ghost" id="newPhotoBtn">Load different photo</button>
      <button class="btn btn-primary" id="exportBtn">Export crop</button>
    </div>

  </div>

</main>

<footer>Runs entirely client-side. Your photos never leave this browser tab.</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
(function(){
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const workspace = document.getElementById('workspace');
  const sourceImage = document.getElementById('sourceImage');
  const frameTabs = document.getElementById('frameTabs');
  const formatSelect = document.getElementById('formatSelect');
  const qualityGroup = document.getElementById('qualityGroup');
  const qualityRange = document.getElementById('qualityRange');
  const qualityReadout = document.getElementById('qualityReadout');
  const dimsReadout = document.getElementById('dimsReadout');
  const resetBtn = document.getElementById('resetBtn');
  const newPhotoBtn = document.getElementById('newPhotoBtn');
  const exportBtn = document.getElementById('exportBtn');

  let cropper = null;
  let currentFileName = 'photo';
  let objectUrl = null;

  // ---- File loading ----
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      loadFile(e.dataTransfer.files[0]);
    }
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    if (!file.type.startsWith('image/')) {
      alert('Please choose an image file.');
      return;
    }
    currentFileName = (file.name || 'photo').replace(/\.[^/.]+$/, '');

    if (objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = URL.createObjectURL(file);
    sourceImage.src = objectUrl;

    sourceImage.onload = () => {
      workspace.classList.add('active');
      dropzone.style.display = 'none';
      initCropper();
    };
  }

  function initCropper() {
    if (cropper) cropper.destroy();
    cropper = new Cropper(sourceImage, {
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 0.9,
      background: false,
      responsive: true,
      restore: false,
      guides: true,
      center: true,
      highlight: true,
      cropBoxMovable: true,
      cropBoxResizable: true,
      toggleDragModeOnDblclick: false,
      crop() {
        updateDims();
      }
    });
    // default to first ratio tab (1:1)
    setActiveTab(frameTabs.querySelector('.frame-tab'));
  }

  function updateDims() {
    if (!cropper) return;
    const data = cropper.getData(true);
    dimsReadout.innerHTML = `<span>${data.width}</span> × <span>${data.height}</span> px`;
  }

  // ---- Aspect ratio tabs ----
  frameTabs.addEventListener('click', (e) => {
    const btn = e.target.closest('.frame-tab');
    if (!btn || !cropper) return;
    setActiveTab(btn);
  });

  function setActiveTab(btn) {
    frameTabs.querySelectorAll('.frame-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const ratio = parseFloat(btn.dataset.ratio);
    cropper.setAspectRatio(isNaN(ratio) ? NaN : ratio);
  }

  // ---- Quality slider ----
  qualityRange.addEventListener('input', () => {
    qualityReadout.textContent = Math.round(qualityRange.value * 100) + '%';
  });
  formatSelect.addEventListener('change', () => {
    qualityGroup.style.display = formatSelect.value === 'image/jpeg' ? 'flex' : 'none';
  });

  // ---- Reset / new photo ----
  resetBtn.addEventListener('click', () => {
    if (cropper) cropper.reset();
  });

  newPhotoBtn.addEventListener('click', () => {
    if (cropper) { cropper.destroy(); cropper = null; }
    workspace.classList.remove('active');
    dropzone.style.display = 'block';
    fileInput.value = '';
  });

  // ---- Export at full source resolution ----
  exportBtn.addEventListener('click', () => {
    if (!cropper) return;

    // getCroppedCanvas without width/height caps outputs at the
    // cropped region's native pixel resolution from the source image,
    // so quality is preserved rather than downsampled to the on-screen
    // preview size.
    const canvas = cropper.getCroppedCanvas({
      imageSmoothingEnabled: true,
      imageSmoothingQuality: 'high'
    });

    if (!canvas) {
      alert('Could not generate the crop. Try a smaller image or a different browser.');
      return;
    }

    const format = formatSelect.value;
    const quality = format === 'image/jpeg' ? parseFloat(qualityRange.value) : undefined;
    const ext = format === 'image/png' ? 'png' : 'jpg';

    canvas.toBlob((blob) => {
      if (!blob) {
        alert('Export failed. Please try again.');
        return;
      }
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${currentFileName}-crop.${ext}`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(link.href), 2000);
    }, format, quality);
  });

})();
</script>

</body>
</html>
